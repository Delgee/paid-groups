# Docker Compose Override for Local Development
# This file is automatically loaded when using: docker-compose up
# It overrides settings from docker-compose.yml for development convenience

version: '3.8'

services:
  # Add Adminer for database management in development
  postgres-admin:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - telegram-saas-network
    depends_on:
      - postgres

  # Add Redis Commander for Redis management in development
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: redis:redis:6379
    networks:
      - telegram-saas-network
    depends_on:
      - redis
